[build]
  command   = "npm run build"
  publish   = "dist"

[build.environment]
  VITE_BASE_PATH = "/"

# Redirect all routes to index.html so React Router / hash links work correctly
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200

# Security & performance headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options        = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy        = "strict-origin-when-cross-origin"
    Permissions-Policy     = "camera=(), microphone=(), geolocation=()"

# Long-term cache for hashed static assets (JS / CSS bundles)
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
